; =============================================================================
; ESP8266 WiFi NAT Router & Range Extender
; PlatformIO Project Configuration
; =============================================================================

[env:esp8266-router]
platform = espressif8266@4.2.1
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; --- Memory / Flash ---
board_build.flash_mode = dio
board_build.ldscript = eagle.flash.4m2m.ld
board_build.filesystem = littlefs

; --- Build flags ---
build_flags =
    -D VERSION=\"1.0.0\"
    -D BUILD_TIMESTAMP=__TIMESTAMP__
    ; lwIP variant with NAPT support
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH_LOW_FLASH
    ; Enable IP forwarding and NAPT
    -D IP_FORWARD=1
    -D IP_NAPT=1
    -D NAPT_MAX=512
    -D PORTMAP_MAX=32
    ; Async TCP
    -D ASYNC_TCP_SSL_ENABLED=0
    ; Telnet buffer
    -D TELNET_MAX_CLIENTS=2
    ; MQTT
    -D MQTT_MAX_PACKET_SIZE=512

; --- Dependencies ---
lib_deps =
    ESP8266WiFi
    ESP8266WebServer
    ESP8266mDNS
    DNSServer
    LittleFS
    ArduinoJson@^6.21.0
    PubSubClient@^2.8
    ESPAsyncTCP@^1.2.2
    me-no-dev/ESPAsyncWebServer@^1.2.3

; --- Upload ---
upload_protocol = esptool
; For OTA: uncomment and set IP
; upload_protocol = espota
; upload_port = 192.168.4.1

; --- Minimal debug build ---
[env:esp8266-router-debug]
extends = env:esp8266-router
build_type = debug
build_flags =
    ${env:esp8266-router.build_flags}
    -D DEBUG_ESP_PORT=Serial
    -D DEBUG_ESP_CORE
    -D ENABLE_DEBUG=1

; --- Compact build for ESP-01 (1MB flash) ---
[env:esp01-router]
extends = env:esp8266-router
board = esp01_1m
board_build.ldscript = eagle.flash.1m256.ld
build_flags =
    ${env:esp8266-router.build_flags}
    -D MINIMAL_BUILD=1
